<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SAKEYŌ — Scan (Type C)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --crimson:#9B1B1B; --crimson-deep:#7A1515; --crimson-glow:#c43030;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#DED6CA;font-family:var(--sans);color:#fff;-webkit-font-smoothing:antialiased;letter-spacing:-0.011em}
body{min-height:100vh;display:flex;justify-content:center;padding:32px 0}
a,button{color:inherit;text-decoration:none;border:none;background:none;font-family:inherit;cursor:pointer;outline:none}

.device{width:436px;background:#0a0a0a;border-radius:52px;padding:10px;box-shadow:0 30px 80px rgba(0,0,0,.5),0 0 0 2px #1a1a1a inset;height:fit-content}
.phone{width:416px;height:896px;border-radius:44px;overflow:hidden;position:relative;
  background:
    radial-gradient(ellipse 70% 50% at 50% 40%, rgba(70,55,40,0.7) 0%, rgba(25,20,15,0.95) 55%, #0a0806 100%),
    #070504}

/* Simulated camera feed — warm out-of-focus bottle shapes */
.phone::before{content:'';position:absolute;inset:0;z-index:1;pointer-events:none;
  background-image:
    radial-gradient(circle at 25% 75%, rgba(180,140,90,0.25) 0%, transparent 18%),
    radial-gradient(circle at 75% 68%, rgba(140,100,70,0.22) 0%, transparent 20%),
    radial-gradient(circle at 50% 85%, rgba(90,70,50,0.28) 0%, transparent 28%);
  filter:blur(18px)}
.phone::after{content:'';position:absolute;inset:0;z-index:2;pointer-events:none;
  background:radial-gradient(ellipse 120% 110% at 50% 50%, transparent 30%, rgba(0,0,0,0.35) 75%, rgba(0,0,0,0.6) 100%)}

/* Chrome on top */
.top-bar{position:absolute;top:18px;left:18px;right:18px;z-index:10;display:flex;align-items:center;justify-content:space-between}
.cancel{color:#fff;font-size:14px;font-weight:500;letter-spacing:-0.005em;padding:9px 0;display:flex;align-items:center;gap:6px;text-shadow:0 1px 3px rgba(0,0,0,0.6)}
.cancel svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.mode-pill{display:inline-flex;align-items:center;gap:8px;padding:7px 14px;border-radius:100px;background:rgba(0,0,0,0.45);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.12);font-size:12px;font-weight:500;color:#fff;letter-spacing:-0.005em}
.mode-pill .dot{width:6px;height:6px;border-radius:50%;background:var(--crimson-glow);box-shadow:0 0 8px var(--crimson-glow)}
.top-icons{display:flex;gap:10px}
.top-btn{width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,0.45);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;color:#fff}
.top-btn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.top-btn.active{background:rgba(184,137,43,0.35);border-color:rgba(184,137,43,0.5)}

/* VIEWFINDER FRAME — bottle aspect with corner L-brackets */
.viewfinder{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:230px;height:360px;z-index:5;pointer-events:none}
.vf-corner{position:absolute;width:30px;height:30px;border:2px solid rgba(255,255,255,0.88)}
.vf-corner.tl{top:0;left:0;border-right:none;border-bottom:none;border-top-left-radius:4px}
.vf-corner.tr{top:0;right:0;border-left:none;border-bottom:none;border-top-right-radius:4px}
.vf-corner.bl{bottom:0;left:0;border-right:none;border-top:none;border-bottom-left-radius:4px}
.vf-corner.br{bottom:0;right:0;border-left:none;border-top:none;border-bottom-right-radius:4px}
/* Scan line — animated */
.scan-line{position:absolute;left:8px;right:8px;height:2px;background:linear-gradient(90deg, transparent, var(--crimson-glow), transparent);box-shadow:0 0 10px var(--crimson-glow);animation:scan 2.4s ease-in-out infinite}
@keyframes scan{0%,100%{top:12%}50%{top:82%}}
/* Ghost bottle outline inside viewfinder — guide */
.vf-ghost{position:absolute;left:50%;top:12px;transform:translateX(-50%);width:78px;height:calc(100% - 24px);opacity:0.18}
.vf-ghost svg{width:100%;height:100%;fill:none;stroke:#fff;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}

/* PROMPT */
.prompt{position:absolute;left:0;right:0;top:calc(50% + 200px);z-index:6;text-align:center;padding:0 40px;pointer-events:none}
.prompt .main{font-size:16px;font-weight:500;color:#fff;letter-spacing:-0.018em;margin-bottom:6px;text-shadow:0 1px 4px rgba(0,0,0,0.55)}
.prompt .sub{font-size:13px;color:rgba(255,255,255,0.72);letter-spacing:-0.005em;line-height:1.45;text-shadow:0 1px 3px rgba(0,0,0,0.55)}

/* CONTROL BAR — capture button, gallery thumb, flip camera */
.controls{position:absolute;bottom:42px;left:0;right:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:0 40px}
.ctrl-gallery{width:48px;height:48px;border-radius:12px;overflow:hidden;border:1.5px solid rgba(255,255,255,0.35);background:#222;box-shadow:0 2px 6px rgba(0,0,0,0.35)}
.ctrl-gallery img{width:100%;height:100%;object-fit:cover;display:block;filter:saturate(0.85) brightness(0.95)}
.capture{width:76px;height:76px;border-radius:50%;background:#fff;border:4px solid rgba(255,255,255,0.35);display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(0,0,0,0.45), inset 0 0 0 2px rgba(0,0,0,0.03);position:relative}
.capture::after{content:"";position:absolute;inset:6px;border-radius:50%;background:radial-gradient(circle at 35% 30%, #c43030 0%, var(--crimson) 45%, var(--crimson-deep) 100%);box-shadow:inset 0 1px 0 rgba(255,255,255,0.2)}
.ctrl-flip{width:48px;height:48px;border-radius:50%;background:rgba(0,0,0,0.45);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;color:#fff}
.ctrl-flip svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* MODE TOGGLE below capture */
.mode-row{position:absolute;bottom:18px;left:0;right:0;z-index:10;display:flex;gap:22px;align-items:center;justify-content:center;font-size:11px;font-weight:500;letter-spacing:-0.005em;color:rgba(255,255,255,0.5)}
.mode-row a{padding:4px 8px;text-decoration:none}
.mode-row .on{color:#fff}
.mode-row .on::after{content:"";display:block;margin:3px auto 0;width:4px;height:4px;border-radius:50%;background:var(--crimson-glow)}
</style>
</head>
<body data-screen-label="Scan · Capture (Type C)">
<div class="device"><div class="phone">

<!-- TOP CHROME -->
<div class="top-bar">
  <a class="cancel" href="SakeYo_Home_v2-2_TypeC.html"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>Cancel</a>
  <div class="mode-pill"><span class="dot"></span>Bottle label</div>
  <div class="top-icons">
    <button class="top-btn" aria-label="Flash"><svg viewBox="0 0 24 24"><path d="M13 2L4 14h7l-1 8 9-12h-7z"/></svg></button>
    <button class="top-btn active" aria-label="Auto-crop"><svg viewBox="0 0 24 24"><path d="M7 3H5a2 2 0 00-2 2v2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2"/></svg></button>
  </div>
</div>

<!-- VIEWFINDER -->
<div class="viewfinder">
  <div class="vf-corner tl"></div>
  <div class="vf-corner tr"></div>
  <div class="vf-corner bl"></div>
  <div class="vf-corner br"></div>
  <div class="vf-ghost">
    <svg viewBox="0 0 80 320" preserveAspectRatio="none">
      <path d="M34 0 L34 24 Q34 32 30 40 L26 58 Q22 72 22 88 L22 298 Q22 312 34 316 L46 316 Q58 312 58 298 L58 88 Q58 72 54 58 L50 40 Q46 32 46 24 L46 0 Z"/>
      <line x1="22" y1="120" x2="58" y2="120"/>
      <line x1="22" y1="160" x2="58" y2="160"/>
      <line x1="22" y1="200" x2="58" y2="200"/>
    </svg>
  </div>
  <div class="scan-line"></div>
</div>

<!-- PROMPT -->
<div class="prompt">
  <div class="main">Align the label in the frame</div>
  <div class="sub">Hold steady. We'll auto-capture when it's sharp.</div>
</div>

<!-- CONTROLS -->
<div class="controls">
  <a class="ctrl-gallery" href="#" data-dest="gallery" aria-label="Pick from gallery">
    <img src="Images/sakeyo_bottle_detail_Hakkaisan Tokubetsu Junmai.png" alt="">
  </a>
  <a class="capture" href="sakeyo_Scan_Result_TypeC.html" aria-label="Capture"></a>
  <button class="ctrl-flip" aria-label="Switch camera"><svg viewBox="0 0 24 24"><path d="M21 15V9a2 2 0 00-2-2h-3.5L14 5H10L8.5 7H5a2 2 0 00-2 2v9a2 2 0 002 2h5"/><path d="M13 17l3 3 3-3M16 20v-7"/></svg></button>
</div>

<div class="mode-row">
  <a href="sakeyo_Scan_Capture_TypeC.html" class="on">Bottle label</a>
  <a href="sakeyo_Explore_TypeC.html">Menu</a>
  <a href="#" data-dest="scan-back">Back label</a>
</div>

</div></div>
</body></html>
