<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SAKEYŌ — Thank you (Type C)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --black:#0d131a; --black-deep:#05080c;
  --crimson:#9B1B1B; --crimson-deep:#7A1515;
  --cream:#F5F0EB; --cream-deep:#EDE6DD; --cream-warm:#E8DFD2;
  --ink:#101820; --ink-mute:#5F5E5A; --ink-faint:#8A8880;
  --hair:rgba(16,24,32,0.10); --hair-soft:rgba(16,24,32,0.06); --hair-strong:rgba(16,24,32,0.14);
  --sage:#2D6B4F;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#DED6CA;font-family:var(--sans);color:var(--ink);-webkit-font-smoothing:antialiased;letter-spacing:-0.011em}
body{min-height:100vh;display:flex;justify-content:center;padding:32px 0}
a{color:inherit;text-decoration:none}

.device{width:436px;background:#0a0a0a;border-radius:52px;padding:10px;box-shadow:0 30px 80px rgba(0,0,0,.5),0 0 0 2px #1a1a1a inset;height:fit-content}
.phone{width:416px;height:896px;
  background:
    radial-gradient(ellipse 85% 65% at 50% 42%, rgba(252,245,232,0.9) 0%, transparent 60%),
    radial-gradient(ellipse 110% 95% at 50% 50%, transparent 55%, rgba(20,15,10,0.14) 100%),
    var(--cream);
  overflow-y:auto;overflow-x:hidden;border-radius:44px;scrollbar-width:none;position:relative;display:flex;flex-direction:column}
.phone::-webkit-scrollbar{display:none}
.phone::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:1;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.04  0 0 0 0 0.06  0 0 0 0 0.08  0 0 0 0.5 0'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.35'/></svg>");
  opacity:0.25;mix-blend-mode:multiply}

/* Minimal top chrome — just a close X */
.top-close{position:absolute;top:14px;right:14px;z-index:30;width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:var(--ink-mute)}
.top-close svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* BODY — centered hero */
.thanks{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 22px;text-align:center;position:relative;z-index:2}
.check-disk{width:96px;height:96px;border-radius:50%;background:radial-gradient(circle at 35% 30%, #c43030 0%, var(--crimson) 45%, var(--crimson-deep) 100%);display:flex;align-items:center;justify-content:center;margin-bottom:28px;box-shadow:inset 0 1px 0 rgba(255,255,255,0.2), 0 6px 20px -4px rgba(155,27,27,0.35), 0 16px 40px -12px rgba(155,27,27,0.25)}
.check-disk svg{width:44px;height:44px;fill:none;stroke:#fff;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
.thanks h1{font-family:var(--sans);font-weight:600;font-size:32px;line-height:1.08;letter-spacing:-0.028em;color:var(--ink);margin-bottom:12px}
.thanks p{font-size:15px;color:var(--ink-mute);line-height:1.55;letter-spacing:-0.008em;max-width:36ch;margin-bottom:32px}

/* Actions */
.actions{width:100%;display:flex;flex-direction:column;gap:14px;align-items:center}
.act-primary{width:100%;padding:16px 0;background:var(--crimson);color:#fff;border-radius:100px;font-size:15px;font-weight:600;letter-spacing:-0.008em;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(155,27,27,0.18), 0 10px 20px -4px rgba(155,27,27,0.22)}
.act-link{font-size:14px;color:var(--ink);font-weight:500;letter-spacing:-0.005em;padding:8px 4px}
.act-link.mute{color:var(--ink-mute);font-weight:400;text-decoration:underline;text-underline-offset:3px}

/* FOOTER */
.foot{padding:24px 22px 18px;text-align:center;position:relative;z-index:2}
.foot-glyph{font-family:var(--sans);font-size:60px;line-height:1;color:rgba(16,24,32,0.10);font-weight:400;user-select:none;letter-spacing:0;margin-bottom:2px}
.foot-tag{font-size:12px;font-weight:400;color:var(--ink-mute);letter-spacing:-0.005em}
</style>
</head>

  </div>
</div>

</div>
