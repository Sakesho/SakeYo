<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SAKEYŌ — New diary entry</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=supreme@italic,400,500,600,700&display=swap" rel="stylesheet">
<style>
:root{
  --black:#0d131a; --black-deep:#05080c; --charcoal:#1a2028;
  --crimson:#9B1B1B; --crimson-deep:#7A1515;
  --cream:#F5F0EB; --cream-deep:#EDE6DD; --cream-warm:#E8DFD2;
  --cream-lit:#F5EBD8; --cream-shadow:#D4C5AA;
  --ink:#101820; --ink-mute:#5F5E5A; --ink-faint:#8A8880;
  --hair:rgba(16,24,32,0.10); --hair-soft:rgba(16,24,32,0.06); --hair-strong:rgba(16,24,32,0.14);
  --sage:#2D6B4F; --gold:#B8843C;
  --sans:'Supreme','Inter',-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;
  --serif:'Newsreader', Georgia, 'Iowan Old Style', serif;
  --r-sm:6px; --r-md:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#DED6CA;font-family:var(--sans);color:var(--ink);-webkit-font-smoothing:antialiased;letter-spacing:-0.011em}
body{min-height:100vh;display:flex;justify-content:center;padding:32px 0}
a{color:inherit;text-decoration:none}
button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit}

.device{width:436px;background:#0a0a0a;border-radius:52px;padding:10px;box-shadow:0 30px 80px rgba(0,0,0,.5),0 0 0 2px #1a1a1a inset;height:fit-content}
.phone{width:416px;height:896px;background:var(--cream);overflow-y:auto;overflow-x:hidden;border-radius:42px;scrollbar-width:none;position:relative;box-shadow:inset 0 0 0 1px #0a0a0a}
.phone::-webkit-scrollbar{display:none}

.hdr{position:sticky;top:0;z-index:50;background:var(--black);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;min-height:52px;box-shadow:0 1px 0 rgba(255,255,255,0.03) inset}
.hdr-back{color:rgba(255,255,255,0.75);display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;letter-spacing:-0.005em;width:64px}
.hdr-back svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.hdr-word{font-family:var(--sans);font-size:14px;font-weight:700;color:#fff;letter-spacing:0.22em;text-transform:uppercase}
.hdr-word .yo{color:var(--crimson)}
.hdr-right{display:flex;align-items:center;gap:14px;width:64px;justify-content:flex-end}

.greet{background:var(--black);padding:14px 22px 26px}
.greet-ovr{font-size:10px;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;color:rgba(245,240,235,0.55)}
.greet-name{font-family:var(--sans);font-size:32px;font-weight:400;color:var(--cream);margin-top:6px;line-height:1.1;letter-spacing:-0.015em}

/* BOTTLE STRIP */
.bottle-strip{display:flex;gap:14px;padding:20px 22px;align-items:center;border-bottom:1px solid var(--hair);background:var(--cream)}
.bottle-strip img{width:44px;height:86px;object-fit:contain;flex-shrink:0;filter:drop-shadow(-1px 3px 5px rgba(0,0,0,0.22))}
.bs-body{flex:1;min-width:0}
.bs-name{font-family:var(--sans);font-size:17px;font-weight:500;color:var(--ink);letter-spacing:-0.012em;line-height:1.2;margin-bottom:2px}
.bs-brew{font-family:var(--sans);font-style:italic;font-size:12.5px;color:var(--ink-mute);letter-spacing:0}

/* FORM */
.form-sec{padding:0 22px}
.form-row{padding:18px 0;border-top:1px solid var(--hair);display:flex;flex-direction:column;gap:8px}
.form-row:first-child{border-top:none}
.form-label{font-family:var(--sans);font-size:10px;font-weight:600;letter-spacing:0.20em;text-transform:uppercase;color:var(--ink-mute)}
.form-input{font-family:var(--sans);font-size:16px;font-weight:400;color:var(--ink);letter-spacing:-0.01em;background:transparent;border:none;padding:0;outline:none;width:100%}
.form-input::placeholder{color:var(--ink-faint)}

.chip-row{display:flex;gap:8px;flex-wrap:wrap}
.f-chip{padding:9px 15px;border-radius:100px;border:1px solid rgba(16,24,32,0.22);background:transparent;font-family:var(--sans);font-size:13px;font-weight:500;color:var(--ink-mute);letter-spacing:-0.005em;cursor:pointer;user-select:none}
.f-chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}

/* VESSEL SELECTOR — shape picker carried from legacy */
.vessel-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:4px}
.v-opt{aspect-ratio:1/1.15;border:1px solid var(--hair-strong);background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;padding:10px 6px;border-radius:var(--r-sm);color:var(--ink-mute);transition:background .15s ease,border-color .15s ease}
.v-opt.on{border-color:var(--crimson);background:rgba(155,27,27,0.04);color:var(--crimson)}
.v-opt svg{width:36px;height:40px;fill:none;stroke:currentColor;stroke-width:1.4;stroke-linejoin:round;stroke-linecap:round}
.v-opt-name{font-family:var(--sans);font-size:11px;font-weight:500;letter-spacing:-0.003em;line-height:1.2;text-align:center}
.v-opt.on .v-opt-name{font-weight:600}
.v-opt-jp{font-family:var(--serif);font-style:italic;font-size:10.5px;color:var(--ink-faint);margin-top:1px;line-height:1}
.v-opt.on .v-opt-jp{color:var(--crimson);opacity:0.75}

/* PAIRED WITH — multi-row builder */
.pair-builder{display:flex;flex-direction:column;gap:0;margin-top:4px}
.pair-edit-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-top:1px solid var(--hair);position:relative}
.pair-edit-row:first-child{border-top:1px solid rgba(16,24,32,0.16)}
.pair-edit-row:last-of-type{border-bottom:1px solid var(--hair)}
.pair-fields{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.pair-dish{font-family:var(--sans);font-size:15px;font-weight:500;color:var(--ink);letter-spacing:-0.01em;background:transparent;border:none;outline:none;width:100%;padding:0}
.pair-dish::placeholder{color:var(--ink-faint);font-weight:400}
.pair-note{font-family:var(--sans);font-style:italic;font-size:13px;color:var(--ink-mute);letter-spacing:0;background:transparent;border:none;outline:none;width:100%;padding:0}
.pair-note::placeholder{color:var(--ink-faint);font-style:italic}
.pair-remove{flex-shrink:0;width:22px;height:22px;border:none;background:transparent;color:var(--ink-faint);cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .12s ease}
.pair-edit-row:hover .pair-remove{opacity:1}
.pair-remove svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round}
.pair-add{display:inline-flex;align-items:center;gap:6px;margin-top:12px;font-family:var(--sans);font-size:13px;font-weight:500;color:var(--crimson);letter-spacing:-0.005em;background:transparent;border:none;cursor:pointer;padding:4px 0}
.pair-add svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round}

/* RATING */
.rating-row{display:flex;gap:8px;align-items:center}
.rating-star{width:26px;height:26px;cursor:pointer;color:rgba(16,24,32,0.22)}
.rating-star svg{width:100%;height:100%;fill:currentColor;stroke:currentColor;stroke-width:0.5}
.rating-star.on{color:var(--crimson)}

/* TEXTAREA — tasting note */
.note-label{font-family:var(--sans);font-size:10px;font-weight:600;letter-spacing:0.20em;text-transform:uppercase;color:var(--ink-mute);margin-bottom:8px}
.note-area{font-family:var(--sans);font-size:15.5px;line-height:1.6;color:var(--ink);letter-spacing:-0.008em;background:transparent;border:none;outline:none;width:100%;resize:none;min-height:120px;font-style:normal}
.note-area::placeholder{color:var(--ink-faint);font-style:italic}

/* CTA */
.cta-zone{position:sticky;bottom:58px;z-index:10;padding:12px 18px 14px;background:linear-gradient(180deg,rgba(245,240,235,0) 0%,var(--cream) 40%)}
.btn-save{width:100%;padding:16px 22px;background:var(--crimson);color:#fff;border-radius:100px;font-family:var(--sans);font-size:14px;font-weight:600;letter-spacing:-0.005em;border:none;cursor:pointer;box-shadow:0 2px 6px rgba(155,27,27,0.18), 0 10px 20px -4px rgba(155,27,27,0.22);display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none}
.btn-save svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.foot{padding:44px 22px 14px;text-align:center;position:relative;z-index:2}
.foot-glyph{font-family:var(--sans);font-size:72px;line-height:1;color:rgba(16,24,32,0.10);font-weight:400;user-select:none}

.bnav{position:sticky;bottom:0;z-index:20;background:#fff;border-top:1px solid var(--hair);padding:10px 0 18px;display:grid;grid-template-columns:repeat(5,1fr);align-items:center;gap:0;box-shadow:0 -8px 20px -4px rgba(16,24,32,0.04)}
.bnav .b{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--ink-faint);min-height:44px;justify-content:center}
.bnav .b svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.bnav .b .lbl{font-size:10px;font-weight:500;letter-spacing:-0.005em}
.bnav .b.on{color:var(--crimson)}
.bnav .b.on .lbl{font-weight:600}
.bnav .fab-slot{display:flex;justify-content:center;align-items:center}
.bnav .fab{width:52px;height:52px;border-radius:50%;background:radial-gradient(circle at 35% 30%, #c43030 0%, var(--crimson) 45%, var(--crimson-deep) 100%);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:inset 0 1px 0 rgba(255,255,255,0.2), 0 2px 5px rgba(155,27,27,0.22), 0 6px 16px rgba(155,27,27,0.25);transform:translateY(-4px)}
.bnav .fab svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

@media (max-width:500px){body{padding:0!important;min-height:100vh;min-height:100dvh}.device{width:100%!important;background:none!important;border-radius:0!important;padding:0!important;box-shadow:none!important}.phone{width:100%!important;height:100vh!important;height:100dvh!important;border-radius:0!important;box-shadow:none!important}.hdr{padding-top:calc(14px + env(safe-area-inset-top))!important}.bnav{padding-bottom:calc(18px + env(safe-area-inset-bottom))!important}}
h1, h2, .art-title, .type-hero, .type-greeting, .kit-title, .greet-name, .hero-h1, .name-primary, .name-secondary { font-variation-settings: "opsz" 44; }
.prose, .prose p, body { font-variation-settings: "opsz" 16; }
</style>
</head>

<script>
// Chip groups — single select (chips)
document.querySelectorAll('.f-chip').forEach(c => c.addEventListener('click', () => {
  const group = c.dataset.group;
  document.querySelectorAll(`.f-chip[data-group="${group}"]`).forEach(x => x.classList.remove('on'));
  c.classList.add('on');
}));
// Vessel selector — single select (shape buttons)
document.querySelectorAll('.v-opt').forEach(v => v.addEventListener('click', () => {
  document.querySelectorAll('.v-opt[data-group="vessel"]').forEach(x => x.classList.remove('on'));
  v.classList.add('on');
}));
// Paired with — multi-row builder
(function(){
  const builder = document.getElementById('pair-builder');
  const addBtn = document.getElementById('pair-add');
  function wireRow(row){
    row.querySelector('.pair-remove').addEventListener('click', () => {
      if (builder.querySelectorAll('.pair-edit-row').length > 1) row.remove();
      else { row.querySelectorAll('input').forEach(i => i.value = ''); }
    });
  }
  builder.querySelectorAll('.pair-edit-row').forEach(wireRow);
  addBtn.addEventListener('click', () => {
    const tmpl = builder.querySelector('.pair-edit-row').cloneNode(true);
    tmpl.querySelectorAll('input').forEach(i => i.value = '');
    builder.appendChild(tmpl);
    wireRow(tmpl);
    tmpl.querySelector('.pair-dish').focus();
  });
})();
// Rating stars
document.querySelectorAll('.rating-star').forEach(s => s.addEventListener('click', () => {
  const val = parseInt(s.dataset.val, 10);
  document.querySelectorAll('.rating-star').forEach(x => {
    x.classList.toggle('on', parseInt(x.dataset.val, 10) <= val);
  });
}));
</script>
