<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">

<title>SAKEYŌ — Thank you (Kinfolk)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

<style>
:root{
  --black:#0d131a; --black-deep:#05080c;
  --crimson:#9B1B1B; --crimson-deep:#7A1515;
  --cream:#F5F0EB; --cream-deep:#EDE6DD; --cream-warm:#E8DFD2;
  --ink:#101820; --ink-mute:#5F5E5A; --ink-faint:#8A8880;
  --hair:rgba(16,24,32,0.10); --hair-soft:rgba(16,24,32,0.06); --hair-strong:rgba(16,24,32,0.14);
  --sage:#2D6B4F;
  --sans:'Switzer','Inter',-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;
  --serif:'Instrument Serif', Georgia, 'Iowan Old Style', serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#DED6CA;font-family:var(--sans);color:var(--ink);-webkit-font-smoothing:antialiased;letter-spacing:-0.011em}
body{min-height:100vh;display:flex;justify-content:center;padding:32px 0}
a{color:inherit;text-decoration:none}

.device{width:436px;background:#0a0a0a;border-radius:52px;padding:10px;box-shadow:0 30px 80px rgba(0,0,0,.5),0 0 0 2px #1a1a1a inset;height:fit-content}
.phone{width:416px;height:896px;background:var(--cream);overflow-y:auto;overflow-x:hidden;border-radius:42px;scrollbar-width:none;position:relative;display:flex;flex-direction:column;box-shadow:inset 0 0 0 1px #0a0a0a}
.phone::-webkit-scrollbar{display:none}

.top-close{position:absolute;top:14px;right:14px;z-index:30;width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:var(--ink-mute)}
.top-close svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.thanks{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 22px;text-align:center;position:relative;z-index:2}
.check-disk{width:88px;height:88px;border-radius:50%;background:radial-gradient(circle at 35% 30%, #c43030 0%, var(--crimson) 45%, var(--crimson-deep) 100%);display:flex;align-items:center;justify-content:center;margin-bottom:32px;box-shadow:inset 0 1px 0 rgba(255,255,255,0.2), 0 6px 20px -4px rgba(155,27,27,0.32), 0 16px 40px -12px rgba(155,27,27,0.22)}
.check-disk svg{width:40px;height:40px;fill:none;stroke:#fff;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
.thanks .ovr{font-family:var(--sans);font-size:10px;font-weight:600;letter-spacing:0.20em;text-transform:uppercase;color:var(--crimson);margin-bottom:14px}
.thanks h1{font-family:var(--sans);font-weight:400;font-size:38px;line-height:1.04;letter-spacing:-0.016em;color:var(--ink);margin-bottom:14px}
.thanks p{font-family:var(--sans);font-style:italic;font-size:15.5px;color:var(--ink-mute);line-height:1.5;letter-spacing:0;max-width:34ch;margin-bottom:36px}

.actions{width:100%;display:flex;flex-direction:column;gap:14px;align-items:center}
.act-primary{width:100%;padding:15px 0;background:var(--crimson);color:#fff;border-radius:100px;font-family:var(--sans);font-size:12px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(155,27,27,0.18), 0 10px 20px -4px rgba(155,27,27,0.22)}
.act-link{font-family:var(--sans);font-size:13px;color:var(--ink);font-weight:500;letter-spacing:-0.005em;padding:8px 4px}
.act-link.mute{color:var(--ink-mute);font-family:var(--sans);font-style:italic;font-weight:400;font-size:13px;letter-spacing:0}

.foot{padding:24px 22px 18px;text-align:center;position:relative;z-index:2}
.foot-glyph{font-family:var(--sans);font-size:60px;line-height:1;color:rgba(16,24,32,0.10);font-weight:400;user-select:none;margin-bottom:2px}
.foot-tag{font-family:var(--sans);font-style:italic;font-size:12.5px;color:var(--ink-mute);letter-spacing:0}
@media (max-width:500px){body{padding:0!important;min-height:100vh;min-height:100dvh}.device{width:100%!important;background:none!important;border-radius:0!important;padding:0!important;box-shadow:none!important}.phone{width:100%!important;height:100vh!important;height:100dvh!important;border-radius:0!important;box-shadow:none!important}.hdr{padding-top:calc(14px + env(safe-area-inset-top))!important}.bnav{padding-bottom:calc(18px + env(safe-area-inset-bottom))!important}}</style>
</head>
<body data-screen-label="Scan · Thanks · Kinfolk">

<a class="top-close" href="SakeYo_Home.html" aria-label="Close"><svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg></a>

<div class="thanks">
  <div class="check-disk"><svg viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg></div>
  <div class="ovr">Submitted</div>
  <h1>Thank you.</h1>
  <p>Your back label photo was submitted. When we add this sake to the database, you'll earn a contribution reward.</p>

  <div class="actions">
    <a class="act-primary" href="sakeyo_Diary.html">Save to my diary</a>
    <a class="act-link" href="sakeyo_Scan_Capture.html">Scan another bottle</a>
    <a class="act-link mute" href="SakeYo_Home.html">Back to home</a>
  </div>
</div>

<div class="foot">
  <div class="foot-glyph">代</div>
  <div class="foot-tag">One rung at a time.</div>
</div>

</div></div>
</body></html>
