<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SAKEYŌ — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=supreme@italic,400,500,600,700&display=swap" rel="stylesheet">
<style>
:root{
  --black:#0d131a; --black-deep:#05080c; --charcoal:#1a2028;
  --crimson:#9B1B1B; --crimson-deep:#7A1515;
  --cream:#F5F0EB; --cream-deep:#EDE6DD; --cream-warm:#E8DFD2;
  --cream-lit:#F5EBD8; --cream-shadow:#D4C5AA;
  --ink:#101820; --ink-mute:#5F5E5A; --ink-faint:#8A8880;
  --hair:rgba(16,24,32,0.10); --hair-soft:rgba(16,24,32,0.06); --hair-strong:rgba(16,24,32,0.14);
  --sage:#2D6B4F;
  --sans:'Supreme','Inter',-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;
  --serif:'Newsreader', Georgia, 'Iowan Old Style', serif;
  --r-sm:6px; --r-md:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#DED6CA;font-family:var(--sans);color:var(--ink);-webkit-font-smoothing:antialiased;letter-spacing:-0.011em}
body{min-height:100vh;display:flex;justify-content:center;padding:32px 0}
a{color:inherit;text-decoration:none}
button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit}

.device{width:436px;background:#0a0a0a;border-radius:52px;padding:10px;box-shadow:0 30px 80px rgba(0,0,0,.5),0 0 0 2px #1a1a1a inset;height:fit-content}
.phone{width:416px;height:896px;background:var(--cream);overflow-y:auto;overflow-x:hidden;border-radius:42px;scrollbar-width:none;position:relative;box-shadow:inset 0 0 0 1px #0a0a0a;display:flex;flex-direction:column}
.phone::-webkit-scrollbar{display:none}

/* HEADER */
.hdr{background:var(--black);padding:14px 18px;display:flex;align-items:center;justify-content:center;min-height:52px;box-shadow:0 1px 0 rgba(255,255,255,0.03) inset;position:relative}
.hdr-word{font-family:var(--sans);font-size:14px;font-weight:700;color:#fff;letter-spacing:0.22em;text-transform:uppercase}
.hdr-word .yo{color:var(--crimson)}

/* GREET / HERO */
.greet{background:var(--black);padding:28px 22px 44px;position:relative;overflow:hidden;color:#fff}
.kanji-watermark{position:absolute;top:0;right:-50px;font-family:var(--sans);font-size:300px;font-weight:400;color:#fff;opacity:0.04;line-height:0.8;pointer-events:none;user-select:none;z-index:0}
.greet-ovr{font-size:10px;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;color:rgba(245,240,235,0.55);position:relative;z-index:2}
.greet-name{font-family:var(--sans);font-size:34px;font-weight:400;color:var(--cream);margin-top:6px;line-height:1.1;letter-spacing:-0.015em;position:relative;z-index:2}
.greet-dek{font-family:var(--sans);font-style:italic;font-size:14px;color:rgba(245,240,235,0.6);line-height:1.5;margin-top:10px;max-width:34ch;position:relative;z-index:2}

/* FORM */
.form-sec{padding:6px 22px 0}
.form-row{padding:18px 0;border-top:1px solid var(--hair);display:flex;flex-direction:column;gap:6px;position:relative}
.form-row:first-child{border-top:none}
.form-label{font-family:var(--sans);font-size:10px;font-weight:600;letter-spacing:0.20em;text-transform:uppercase;color:var(--ink-mute)}
.form-input{font-family:var(--sans);font-size:16px;font-weight:400;color:var(--ink);letter-spacing:-0.01em;background:transparent;border:none;padding:0;outline:none;width:100%}
.form-input::placeholder{color:var(--ink-faint)}
.form-input-wrap{display:flex;align-items:center;gap:8px}
.form-input-wrap .form-input{flex:1}
.pw-eye{width:20px;height:20px;color:var(--ink-faint);display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0}
.pw-eye svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.forgot-row{padding:10px 22px 0;display:flex;justify-content:flex-end}
.forgot-link{font-family:var(--sans);font-size:12.5px;font-weight:500;color:var(--crimson);letter-spacing:-0.005em;border-bottom:1px solid rgba(155,27,27,0.3);padding-bottom:1px}

/* CTA */
.cta-zone{padding:26px 18px 14px}
.btn-save{width:100%;padding:16px 22px;background:var(--crimson);color:#fff;border-radius:100px;font-family:var(--sans);font-size:14px;font-weight:600;letter-spacing:-0.005em;border:none;cursor:pointer;box-shadow:0 2px 6px rgba(155,27,27,0.18), 0 10px 20px -4px rgba(155,27,27,0.22);display:flex;align-items:center;justify-content:center;gap:8px}
.btn-save svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* DIVIDER */
.divider{padding:22px 22px 4px;display:flex;align-items:center;gap:12px}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--hair)}
.divider span{font-family:var(--sans);font-style:italic;font-size:12px;color:var(--ink-faint);letter-spacing:0}

/* SOCIAL */
.social{padding:14px 18px 0;display:flex;flex-direction:column;gap:10px}
.btn-social{width:100%;padding:14px 22px;background:transparent;color:var(--ink);border:1px solid var(--hair-strong);border-radius:100px;font-family:var(--sans);font-size:14px;font-weight:500;letter-spacing:-0.005em;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px}
.btn-social svg{width:18px;height:18px}
.btn-social.apple svg{fill:currentColor}

/* FOOT */
.foot-new{padding:34px 22px 14px;text-align:center;margin-top:auto}
.foot-new-txt{font-family:var(--sans);font-size:13px;color:var(--ink-mute);letter-spacing:-0.005em}
.foot-new-link{font-weight:600;color:var(--crimson);margin-left:4px;border-bottom:1px solid rgba(155,27,27,0.3);padding-bottom:1px}
.foot-glyph{font-family:var(--sans);font-size:56px;line-height:1;color:rgba(16,24,32,0.10);font-weight:400;user-select:none;margin-top:14px}

@media (max-width:500px){body{padding:0!important;min-height:100vh;min-height:100dvh}.device{width:100%!important;background:none!important;border-radius:0!important;padding:0!important;box-shadow:none!important}.phone{width:100%!important;height:100vh!important;height:100dvh!important;border-radius:0!important;box-shadow:none!important}.hdr{padding-top:calc(14px + env(safe-area-inset-top))!important}}
h1, h2, .art-title, .type-hero, .type-greeting, .kit-title, .greet-name, .hero-h1, .name-primary, .name-secondary { font-variation-settings: "opsz" 44; }
.prose, .prose p, body { font-variation-settings: "opsz" 16; }
</style>
</head>
<body data-screen-label="Sign in · Kinfolk">
<div class="device"><div class="phone">

<header class="hdr">
  <div class="hdr-word">SAKE<span class="yo">YŌ</span></div>
</header>

<div class="greet">
  <div class="kanji-watermark">代</div>
  <div class="greet-ovr">Sign in</div>
  <div class="greet-name">Welcome back.</div>
  <div class="greet-dek">Your diary, cellar, and palate are where you left them.</div>
</div>

<!-- FORM -->
<div class="form-sec">
  <div class="form-row">
    <label class="form-label">Email or username</label>
    <input type="text" class="form-input" placeholder="you@email.com" autocomplete="username">
  </div>
  <div class="form-row">
    <label class="form-label">Password</label>
    <div class="form-input-wrap">
      <input type="password" id="pw" class="form-input" placeholder="••••••••••" autocomplete="current-password">
      <button class="pw-eye" id="pw-toggle" aria-label="Show password">
        <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </div>
</div>

<div class="forgot-row">
  <a class="forgot-link" href="#">Forgot password?</a>
</div>

<div class="cta-zone">
  <a class="btn-save" href="SakeYo_Home.html" style="text-decoration:none">
    Sign in
    <svg viewBox="0 0 24 24"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
  </a>
</div>

<div class="divider"><span>or continue with</span></div>

<div class="social">
  <button class="btn-social apple">
    <svg viewBox="0 0 24 24"><path d="M17.05 12.04c-.03-2.93 2.4-4.34 2.51-4.41-1.37-2-3.5-2.28-4.26-2.31-1.81-.18-3.54 1.07-4.46 1.07-.93 0-2.35-1.05-3.86-1.02-1.98.03-3.81 1.15-4.83 2.92-2.07 3.58-.53 8.88 1.48 11.79.98 1.42 2.15 3.02 3.67 2.96 1.48-.06 2.04-.96 3.82-.96 1.78 0 2.29.96 3.85.93 1.59-.03 2.6-1.45 3.57-2.88 1.13-1.65 1.59-3.25 1.62-3.33-.04-.02-3.11-1.19-3.14-4.76zM14.14 3.54c.81-.98 1.36-2.35 1.21-3.71-1.17.05-2.59.78-3.43 1.76-.75.87-1.41 2.26-1.23 3.6 1.3.1 2.64-.66 3.45-1.65z"/></svg>
    Continue with Apple
  </button>
  <button class="btn-social">
    <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Continue with Google
  </button>
</div>

<div class="foot-new">
  <span class="foot-new-txt">New to SAKEYŌ?<a class="foot-new-link" href="sakeyo_Account_Setup.html">Create account</a></span>
  <div class="foot-glyph">代</div>
</div>

</div></div>
<script>
const pw = document.getElementById('pw');
const tog = document.getElementById('pw-toggle');
tog.addEventListener('click', () => {
  const show = pw.type === 'password';
  pw.type = show ? 'text' : 'password';
  tog.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
});
</script>
</body></html>
