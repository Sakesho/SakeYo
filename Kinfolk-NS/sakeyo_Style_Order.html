<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SAKEYŌ — How to order</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500&family=Noto+Serif+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=supreme@italic,400,500,600,700&display=swap" rel="stylesheet">
<style>
:root{
  --black:#0d131a; --black-deep:#05080c; --charcoal:#1a2028;
  --crimson:#9B1B1B; --crimson-deep:#7A1515;
  --cream:#F5F0EB; --cream-deep:#EDE6DD; --cream-warm:#E8DFD2;
  --ink:#101820; --ink-mute:#5F5E5A; --ink-faint:#8A8880;
  --hair:rgba(16,24,32,0.10); --hair-soft:rgba(16,24,32,0.06); --hair-strong:rgba(16,24,32,0.14);
  --sage:#2D6B4F; --sage-lit:#86c69f;
  --gold:#B8843C; --gold-lit:#E0B26A; --gold-deep:#8a5e20;
  --sans:'Supreme','Inter',-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;
  --serif:'Newsreader', Georgia, 'Iowan Old Style', serif;
  --jp:'Noto Serif JP', 'Hiragino Mincho ProN', serif;
  --r-sm:6px; --r-md:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#DED6CA;font-family:var(--sans);color:var(--ink);-webkit-font-smoothing:antialiased;letter-spacing:-0.011em}
body{min-height:100vh;display:flex;justify-content:center;padding:32px 0}
a{color:inherit;text-decoration:none}
button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit}

.device{width:436px;background:#0a0a0a;border-radius:52px;padding:10px;box-shadow:0 30px 80px rgba(0,0,0,.5),0 0 0 2px #1a1a1a inset;height:fit-content}
.phone{width:416px;height:896px;background:var(--cream);overflow-y:auto;overflow-x:hidden;border-radius:42px;scrollbar-width:none;position:relative;box-shadow:inset 0 0 0 1px #0a0a0a}
.phone::-webkit-scrollbar{display:none}

/* HEADER */
.hdr{position:sticky;top:0;z-index:50;background:var(--black);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;min-height:52px;box-shadow:0 1px 0 rgba(255,255,255,0.03) inset}
.hdr-back{color:rgba(255,255,255,0.8);display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;letter-spacing:-0.005em;width:90px}
.hdr-back svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.hdr-word{font-family:var(--sans);font-size:14px;font-weight:700;color:#fff;letter-spacing:0.22em;text-transform:uppercase}
.hdr-word .yo{color:var(--crimson)}
.hdr-right{width:90px;display:flex;justify-content:flex-end;gap:14px}
.hdr-icon{color:rgba(255,255,255,0.85);display:flex}
.hdr-icon svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}

/* HERO — style identity + show-server CTA */
.hero{background:var(--black);padding:24px 22px 26px;color:#fff;position:relative;overflow:hidden}
.hero-over{font-family:var(--sans);font-size:10px;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;color:rgba(245,240,235,0.55);margin-bottom:12px}
.hero-jp{font-family:var(--jp);font-size:54px;font-weight:600;color:#fff;line-height:1;letter-spacing:0.04em;margin-bottom:8px}
.hero-romaji{font-family:var(--sans);font-size:14px;color:rgba(245,240,235,0.5);letter-spacing:0.08em;margin-bottom:14px;text-transform:uppercase;font-weight:500}
.hero-en{font-family:var(--sans);font-size:36px;font-weight:400;color:var(--cream);letter-spacing:-0.02em;margin-bottom:8px;line-height:1.05}
.hero-dek{font-family:var(--sans);font-style:italic;font-size:14px;color:rgba(245,240,235,0.7);line-height:1.5;letter-spacing:0;max-width:36ch;margin-bottom:20px}
.hero-cta{display:inline-flex;align-items:center;gap:8px;padding:13px 18px;border-radius:100px;background:var(--crimson);color:#fff;font-family:var(--sans);font-size:11.5px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;box-shadow:inset 0 1px 0 rgba(255,255,255,0.1), 0 2px 6px rgba(155,27,27,0.22), 0 8px 18px -4px rgba(155,27,27,0.25);cursor:pointer;border:none}
.hero-cta svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* DESCRIPTION */
.section{padding:28px 22px 0;position:relative;z-index:2}
.sec-over{font-family:var(--sans);font-size:10px;font-weight:600;letter-spacing:0.20em;text-transform:uppercase;color:var(--ink-mute);margin-bottom:10px;display:flex;align-items:center;gap:10px}
.sec-over::after{content:"";flex:1;height:1px;background:var(--hair)}
.sec-body{font-family:var(--sans);font-size:14.5px;line-height:1.65;color:var(--ink);letter-spacing:-0.003em;max-width:42ch}

/* EXAMPLES + FOOD pairing — pillared cards */
.fact-grid{padding:22px 22px 0;display:grid;grid-template-columns:1fr;gap:10px;position:relative;z-index:2}
.fact{background:#fff;border:1px solid var(--hair);border-radius:var(--r-sm);padding:16px 18px}
.fact-over{font-family:var(--sans);font-size:9.5px;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:6px}
.fact-body{font-family:var(--sans);font-size:13.5px;line-height:1.55;color:var(--ink);letter-spacing:-0.005em}
.fact-body em{font-style:italic;color:var(--ink-mute)}

/* TAB SWITCHER — English (default) / Japanese */
.tabs{margin:32px 22px 0;display:flex;gap:0;background:transparent;position:relative;z-index:2;border-bottom:1px solid var(--hair)}
.tab{flex:1;padding:12px 0;font-family:var(--sans);font-size:12px;font-weight:500;letter-spacing:-0.005em;color:var(--ink-mute);background:transparent;border:none;border-bottom:1.5px solid transparent;cursor:pointer;text-align:center;display:inline-flex;align-items:center;justify-content:center;gap:8px;margin-bottom:-1px}
.tab.on{color:var(--ink);border-bottom-color:var(--crimson);font-weight:600}
.tab .glyph{font-family:var(--jp);font-size:13px;font-weight:600;opacity:0.55}
.tab.on .glyph{opacity:0.9}

.order-pane{display:none}
.order-pane.on{display:block}

/* HOW TO ORDER — card */
.order-card{margin:14px 22px 0;padding:22px 22px;background:#fff;border:1px solid var(--hair);border-radius:var(--r-sm);position:relative;z-index:2}
.order-jp .order-flag{font-family:var(--sans);font-size:10px;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;color:var(--crimson);margin-bottom:14px;display:inline-flex;align-items:center;gap:8px}
.order-jp .order-flag::before{content:"";display:inline-block;width:18px;height:12px;background:linear-gradient(180deg,#fff 0%,#fff 50%,#bc002d 50%,#bc002d 100%);border:1px solid var(--hair)}
.order-en .order-flag{font-family:var(--sans);font-size:10px;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;color:var(--ink);margin-bottom:14px;display:inline-flex;align-items:center;gap:8px}
.order-en .order-flag::before{content:"EN";font-size:9px;letter-spacing:0.12em;padding:2px 6px;background:var(--ink);color:#fff;border-radius:3px;font-weight:700}

.order-prose-jp{font-family:var(--jp);font-size:18px;line-height:1.6;color:var(--ink);letter-spacing:0.02em;font-weight:500;margin-bottom:8px}
.order-prose-romaji{font-family:var(--sans);font-style:italic;font-size:13px;color:var(--ink-mute);line-height:1.55;letter-spacing:0;margin-bottom:8px}
.order-prose-en-translation{font-family:var(--sans);font-size:12.5px;color:var(--ink-faint);line-height:1.55;letter-spacing:-0.003em;font-style:italic}
.order-prose-en{font-family:var(--sans);font-size:16px;line-height:1.55;color:var(--ink);letter-spacing:-0.005em;font-weight:400}

.kw-head{font-family:var(--sans);font-size:9.5px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-faint);margin:18px 0 10px}
.kw-list{display:flex;flex-direction:column;gap:8px}
.kw{display:flex;align-items:baseline;gap:10px;padding:8px 12px;background:var(--cream-warm);border-radius:var(--r-sm)}
.kw-jp{font-family:var(--jp);font-size:14.5px;font-weight:500;color:var(--ink);letter-spacing:0.02em;flex-shrink:0;min-width:72px}
.kw-ro{font-family:var(--sans);font-style:italic;font-size:11.5px;color:var(--ink-mute);letter-spacing:0;flex-shrink:0;min-width:90px}
.kw-en{font-family:var(--sans);font-size:11.5px;color:var(--ink-mute);letter-spacing:-0.003em;margin-left:auto;text-align:right}

.kw-en-list{display:flex;flex-wrap:wrap;gap:6px}
.kw-chip{display:inline-flex;align-items:center;padding:5px 11px;border-radius:100px;background:var(--cream-warm);font-family:var(--sans);font-size:11px;color:var(--ink);letter-spacing:-0.005em;font-weight:500}

.foot{padding:36px 22px 14px;text-align:center;position:relative;z-index:2}
.foot-glyph{font-family:var(--sans);font-size:72px;line-height:1;color:rgba(16,24,32,0.10);font-weight:400;user-select:none}

.bnav{position:sticky;bottom:0;z-index:20;background:#fff;border-top:1px solid var(--hair);padding:10px 0 18px;display:grid;grid-template-columns:repeat(5,1fr);align-items:center;gap:0;box-shadow:0 -8px 20px -4px rgba(16,24,32,0.04)}
.bnav .b{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--ink-faint);min-height:44px;justify-content:center}
.bnav .b svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.bnav .b .lbl{font-size:10px;font-weight:500;letter-spacing:-0.005em}
.bnav .fab-slot{display:flex;justify-content:center;align-items:center}
.bnav .fab{width:52px;height:52px;border-radius:50%;background:radial-gradient(circle at 35% 30%, #c43030 0%, var(--crimson) 45%, var(--crimson-deep) 100%);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:inset 0 1px 0 rgba(255,255,255,0.2), 0 2px 5px rgba(155,27,27,0.22), 0 6px 16px rgba(155,27,27,0.25);transform:translateY(-4px)}
.bnav .fab svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* SHOW-SERVER FULLSCREEN OVERLAY — high-contrast, hand-the-phone-over UI */
.flashcard{position:fixed;inset:0;background:#000;z-index:200;display:none;flex-direction:column;color:#fff;padding:28px 24px calc(28px + env(safe-area-inset-bottom));overflow-y:auto}
.flashcard.on{display:flex}
.fc-close{align-self:flex-end;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.10);display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;color:#fff}
.fc-close svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round}
.fc-body{flex:1;display:flex;flex-direction:column;justify-content:center;text-align:center;padding:20px 0}
.fc-instr{font-family:var(--sans);font-size:11px;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;color:rgba(255,255,255,0.45);margin-bottom:20px}
.fc-style-jp{font-family:var(--jp);font-size:48px;font-weight:600;letter-spacing:0.05em;margin-bottom:10px;line-height:1.1}
.fc-style-en{font-family:var(--sans);font-style:italic;font-size:15px;color:rgba(255,255,255,0.55);letter-spacing:0;margin-bottom:36px}
.fc-divider{height:1px;background:rgba(255,255,255,0.18);margin:0 0 36px}
.fc-label{font-family:var(--sans);font-size:11px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.45);margin-bottom:18px}
.fc-prose{font-family:var(--jp);font-size:24px;font-weight:500;line-height:1.55;color:#fff;letter-spacing:0.04em;margin-bottom:18px;padding:0 6px}
.fc-romaji{font-family:var(--sans);font-style:italic;font-size:14px;color:rgba(255,255,255,0.6);line-height:1.55;letter-spacing:0;padding:0 12px}
.fc-foot{text-align:center;padding-top:20px;font-family:var(--sans);font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.4)}

@media (max-width:500px){
  body{padding:0!important;min-height:100vh;min-height:100dvh}
  .device{width:100%!important;background:none!important;border-radius:0!important;padding:0!important;box-shadow:none!important}
  .phone{width:100%!important;height:100vh!important;height:100dvh!important;border-radius:0!important;box-shadow:none!important}
  .hdr{padding-top:calc(14px + env(safe-area-inset-top))!important}
  .bnav{padding-bottom:calc(18px + env(safe-area-inset-bottom))!important}
}
</style>
</head>

<script>
// ----------------------------------------------------------------------------
// 11 Harper sake style profiles. Content lifted from harper_sake_profiles.pdf.
// ----------------------------------------------------------------------------
const STYLES = {
  mellow: {
    en: "Mellow", jp: "中口", romaji: "Chūkuchi",
    short: "Balanced and approachable, built around rice rather than fruit, grain, or caramel — the broad middle of the sake spectrum.",
    long: "The center of the sake spectrum, and what much of Japan drinks with dinner every night. SMV near neutral, acidity and amino acids moderate, body mid-range. Junmai, junmai ginjo, tokubetsu junmai, honjozo, and tokubetsu honjozo all land here when nothing pushes the sake toward a more distinctive profile.",
    examples: "Seishu Hakkaisan · Urakasumi Zen Junmai Ginjo · Oku no Matsu Tokubetsu Junmai",
    food: "Strongest with lean umami delicate food — chawanmushi, clear mushroom soups, white fish in light soy. Light sweet-savory dishes (tamagoyaki, nimono, chicken teriyaki) sit comfortably in range. Flattens under bright acidic food and chili-forward spice.",
    jpProse: "バランスが良く、米の旨みが中心で、辛すぎず甘すぎず、香りも穏やかで柔らかい口当たりのものをお願いします。",
    jpRomaji: "Baransu ga yoku, kome no umami ga chūshin de, karasugizu amasugizu, kaori mo odayaka de yawarakai kuchiatari no mono o onegaishimasu.",
    jpEnTranslation: "\"Something balanced and rice-forward, not too dry or sweet, with a gentle aroma and soft mouthfeel, please.\"",
    jpKeywords: [
      {jp:"バランスの良い", romaji:"baransu no yoi", en:"balanced"},
      {jp:"まろやか", romaji:"maroyaka", en:"mellow / rounded"},
      {jp:"米の旨み", romaji:"kome no umami", en:"rice umami"},
      {jp:"穏やか", romaji:"odayaka", en:"gentle"},
      {jp:"中口", romaji:"chūkuchi", en:"medium-sweet"},
      {jp:"柔らかい", romaji:"yawarakai", en:"soft"},
      {jp:"香り控えめ", romaji:"kaori hikaeme", en:"restrained aroma"}
    ],
    enProse: "\"Something balanced and rice-forward, middle of the road, nothing too fruity or heavy.\"",
    enKeywords: ["balanced","rice-forward","middle of the road","medium-bodied","mellow","rounded","soft","restrained aroma","not too dry or sweet"]
  },

  fruity: {
    en: "Fruity", jp: "華やか", romaji: "Hanayaka",

  back.href = `sakeyo_Pairing_Result.html${dish}`;
  back.innerHTML = back.innerHTML.replace('Back', 'Pairing');
}

document.getElementById('jpRomaji').textContent = data.jpRomaji;
document.getElementById('jpEnTranslation').textContent = data.jpEnTranslation;
document.getElementById('enProse').textContent = data.enProse;

const jpKwHost = document.getElementById('jpKeywords');
data.jpKeywords.forEach(k => {
  const row = document.createElement('div');
  row.className = 'kw';
  row.innerHTML = `<span class="kw-jp">${k.jp}</span><span class="kw-ro">${k.romaji}</span><span class="kw-en">${k.en}</span>`;
  jpKwHost.appendChild(row);
});

const enKwHost = document.getElementById('enKeywords');
data.enKeywords.forEach(k => {
  const chip = document.createElement('span');
  chip.className = 'kw-chip';
  chip.textContent = k;
  enKwHost.appendChild(chip);
});

// Flashcard overlay — content
document.getElementById('fcStyleJp').textContent = data.jp;
document.getElementById('fcStyleEn').textContent = data.en;
document.getElementById('fcProse').textContent = data.jpProse;
document.getElementById('fcRomaji').textContent = data.jpRomaji;

// Tab switcher — English / Japanese order panels
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    const which = btn.dataset.tab;
    document.querySelectorAll('.tab').forEach(b => {
      const on = b.dataset.tab === which;
      b.classList.toggle('on', on);
      b.setAttribute('aria-selected', String(on));
    });
    document.getElementById('paneEn').classList.toggle('on', which === 'en');
    document.getElementById('paneJp').classList.toggle('on', which === 'jp');
  });
});

// Flashcard open/close
const fc = document.getElementById('flashcard');
document.getElementById('showFlashcard').addEventListener('click', () => fc.classList.add('on'));
document.getElementById('fcClose').addEventListener('click', () => fc.classList.remove('on'));
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') fc.classList.remove('on'); });
</script>

</body></html>
