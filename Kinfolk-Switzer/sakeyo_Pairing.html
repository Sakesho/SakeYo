<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=switzer@italic,400,500,600,700&display=swap" rel="stylesheet">
<style>
:root{
  --black:#0d131a; --black-deep:#05080c; --charcoal:#1a2028;
  --crimson:#9B1B1B; --crimson-deep:#7A1515;
  --cream:#F5F0EB; --cream-deep:#EDE6DD; --cream-warm:#E8DFD2; --cream-shadow:#D4C5AA;
  --ink:#101820; --ink-mute:#5F5E5A; --ink-faint:#8A8880;
  --hair:rgba(16,24,32,0.10); --hair-soft:rgba(16,24,32,0.06); --hair-strong:rgba(16,24,32,0.14);
  --sage:#2D6B4F;
  --sans:'Switzer','Inter',-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;
  --serif:'Instrument Serif', Georgia, 'Iowan Old Style', serif;
  --r-sm:6px; --r-md:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#DED6CA;font-family:var(--sans);color:var(--ink);-webkit-font-smoothing:antialiased;letter-spacing:-0.011em}
body{min-height:100vh;display:flex;justify-content:center;padding:32px 0}
a{color:inherit;text-decoration:none}
button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit}

.device{width:436px;background:#0a0a0a;border-radius:52px;padding:10px;box-shadow:0 30px 80px rgba(0,0,0,.5),0 0 0 2px #1a1a1a inset;height:fit-content}
.phone{width:416px;height:896px;background:var(--cream);overflow-y:auto;overflow-x:hidden;border-radius:42px;scrollbar-width:none;position:relative;box-shadow:inset 0 0 0 1px #0a0a0a}
.phone::-webkit-scrollbar{display:none}

.hdr{position:sticky;top:0;z-index:50;background:var(--black);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;min-height:52px;box-shadow:0 1px 0 rgba(255,255,255,0.03) inset}
.hdr-left,.hdr-right{display:flex;align-items:center;gap:14px}
.hdr-word{font-family:var(--sans);font-size:14px;font-weight:700;color:#fff;letter-spacing:0.22em;text-transform:uppercase}
.hdr-word .yo{color:var(--crimson)}
.hdr-icon{position:relative;color:rgba(255,255,255,0.85);display:flex}
.hdr-icon svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.hdr-back{width:28px;height:28px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.85)}
.hdr-back svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}

.greet{background:var(--black);padding:14px 22px 26px;position:relative;overflow:hidden}
.greet-ovr{font-size:10px;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;color:rgba(245,240,235,0.55)}
.greet-name{font-family:var(--sans);font-size:40px;font-weight:400;color:var(--cream);margin-top:6px;line-height:1.05;letter-spacing:-0.018em}
.greet-dek{font-family:var(--sans);font-style:italic;font-size:14.5px;color:rgba(245,240,235,0.65);line-height:1.5;margin-top:8px;max-width:36ch;letter-spacing:0}

/* VIEW TOGGLE — matches calendar pattern */
.view-toggle{display:flex;padding:22px 22px 0;gap:0;background:var(--cream);position:relative;z-index:2}
.vt{flex:1;padding:11px 0;font-family:var(--sans);font-size:13px;font-weight:500;letter-spacing:-0.005em;color:var(--ink-mute);background:transparent;border:none;border-bottom:1px solid var(--hair);cursor:pointer;text-align:center;text-decoration:none;display:block}
.vt.on{color:var(--ink);border-bottom-color:var(--crimson);border-bottom-width:1.5px;font-weight:600}

.search-wrap{padding:18px 22px 6px}
.search{position:relative;display:flex;align-items:center;background:#fff;border:1px solid var(--hair);border-radius:999px;padding:0 16px;height:44px;box-shadow:0 1px 2px rgba(16,24,32,0.03)}
.search svg{width:16px;height:16px;fill:none;stroke:var(--ink-faint);stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.search input{flex:1;border:none;outline:none;background:transparent;font-family:var(--sans);font-size:14px;color:var(--ink);letter-spacing:-0.008em;padding:0 10px}
.search input::placeholder{color:var(--ink-faint);font-weight:400}

.sec-head-mini{display:flex;align-items:center;gap:12px;padding:22px 22px 14px;font-family:var(--sans);font-size:10px;font-weight:600;letter-spacing:0.20em;text-transform:uppercase;color:var(--ink-mute)}
.sec-head-mini::after{content:"";flex:1;height:1px;background:var(--hair)}

.dishes{padding:0 22px 6px;display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.dish{background:var(--cream-warm);border:1px solid var(--hair);border-radius:var(--r-md);padding:16px 14px;text-align:left;display:flex;flex-direction:column;gap:3px;position:relative;cursor:pointer;transition:background .18s ease, transform .12s ease;min-height:80px;justify-content:center;font-family:inherit;color:inherit;width:100%}
.dish:active{transform:scale(0.98)}
.dish-name{font-family:var(--sans);font-size:18px;font-weight:400;color:var(--ink);letter-spacing:-0.012em;line-height:1.15;padding-right:18px}
.dish-en{font-family:var(--sans);font-size:11.5px;color:var(--ink-mute);letter-spacing:-0.005em;line-height:1.35}
.dish-arr{position:absolute;top:14px;right:14px;width:12px;height:12px;color:var(--ink-faint);opacity:0.5}
.dish-arr svg{width:100%;height:100%;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

.dish.expanded{grid-column:span 2;background:var(--black);border-color:var(--black);padding:20px 18px 16px;min-height:unset;cursor:default}
.dish.expanded:active{transform:none}
.dish.expanded .dish-name{color:var(--cream);font-size:19px;padding-right:32px}
.dish.expanded .dish-en{color:rgba(245,240,235,0.55);margin-bottom:2px}
.dish.expanded .dish-arr{display:none}
.dish.expanded .dish-close{position:absolute;top:14px;right:12px;width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;cursor:pointer;border:none}
.dish.expanded .dish-close:hover{background:rgba(255,255,255,0.14)}
.dish.expanded .dish-close svg{width:10px;height:10px;fill:none;stroke:var(--cream);stroke-width:2.2;stroke-linecap:round}
.branch-prompt{font-family:var(--sans);font-style:italic;font-size:13px;color:rgba(245,240,235,0.7);margin-top:12px;letter-spacing:0}
.branches{margin-top:10px;display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.branches.tri{grid-template-columns:repeat(3,1fr)}
.branch{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:var(--r-sm);padding:10px 12px;text-align:left;display:flex;flex-direction:column;gap:2px;cursor:pointer;transition:background .12s ease;font-family:inherit;color:inherit;text-decoration:none}
.branch:hover{background:rgba(255,255,255,0.10)}
.branch:active{transform:scale(0.98)}
.branch-name{font-family:var(--sans);font-size:15.5px;font-weight:400;color:var(--cream);letter-spacing:-0.01em;line-height:1.2}
.branch-en{font-family:var(--sans);font-size:10.5px;color:rgba(245,240,235,0.55);letter-spacing:-0.005em;line-height:1.35}

.fallback{padding:28px 22px 18px;text-align:center}
.fallback-q{font-family:var(--sans);font-style:italic;font-size:13.5px;color:var(--ink-mute);margin-bottom:8px;line-height:1.5}
.fallback-link{display:inline-flex;align-items:center;gap:6px;font-family:var(--sans);font-size:13px;font-weight:500;color:var(--crimson);letter-spacing:-0.005em;border-bottom:1px solid rgba(155,27,27,0.3);padding-bottom:2px}
.fallback-link svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* OR card — alternate entry point: user has a specific bottle / menu in front of them */
.or-card{margin:26px 22px 0;padding:20px 20px 18px;background:#fff;border:1px solid var(--hair);border-radius:var(--r-md);display:flex;align-items:center;justify-content:space-between;gap:14px;box-shadow:0 1px 2px rgba(16,24,32,0.03)}
.or-body{flex:1;min-width:0}
.or-over{font-family:var(--sans);font-size:9.5px;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:4px}
.or-q{font-family:var(--sans);font-size:15.5px;font-weight:400;color:var(--ink);letter-spacing:-0.01em;line-height:1.25}
.or-btn{flex-shrink:0;display:inline-flex;align-items:center;gap:7px;padding:10px 14px;border-radius:100px;background:var(--ink);color:var(--cream);font-family:var(--sans);font-size:11px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;white-space:nowrap}
.or-btn svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.foot{padding:36px 22px 14px;text-align:center;position:relative;z-index:2}
.foot-glyph{font-family:var(--sans);font-size:72px;line-height:1;color:rgba(16,24,32,0.10);font-weight:400;user-select:none;margin-bottom:4px}
.foot-tag{font-family:var(--sans);font-style:italic;font-size:14px;color:var(--ink-mute);letter-spacing:0}

.bnav{position:sticky;bottom:0;z-index:20;background:#fff;border-top:1px solid var(--hair);padding:10px 0 18px;display:grid;grid-template-columns:repeat(5,1fr);align-items:center;gap:0;box-shadow:0 -8px 20px -4px rgba(16,24,32,0.04)}
.bnav .b{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--ink-faint);min-height:44px;justify-content:center}
.bnav .b svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.bnav .b .lbl{font-size:10px;font-weight:500;letter-spacing:-0.005em}
.bnav .b.on{color:var(--crimson)}
.bnav .b.on .lbl{font-weight:600}
.bnav .fab-slot{display:flex;justify-content:center;align-items:center}
.bnav .fab{width:52px;height:52px;border-radius:50%;background:radial-gradient(circle at 35% 30%, #c43030 0%, var(--crimson) 45%, var(--crimson-deep) 100%);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:inset 0 1px 0 rgba(255,255,255,0.2), 0 2px 5px rgba(155,27,27,0.22), 0 6px 16px rgba(155,27,27,0.25);transform:translateY(-4px)}
.bnav .fab svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

@media (max-width:500px){body{padding:0!important;min-height:100vh;min-height:100dvh}.device{width:100%!important;background:none!important;border-radius:0!important;padding:0!important;box-shadow:none!important}.phone{width:100%!important;height:100vh!important;height:100dvh!important;border-radius:0!important;box-shadow:none!important}.hdr{padding-top:calc(14px + env(safe-area-inset-top))!important}.bnav{padding-bottom:calc(18px + env(safe-area-inset-bottom))!important}}
</style>
</head>

<script>
(function(){
  const jpGrid = document.getElementById('jpGrid');
  const njGrid = document.getElementById('njGrid');
  const toggleBtns = document.querySelectorAll('.vt');
  const searchInput = document.getElementById('searchInput');

  const placeholders = {
    jp: 'Search a dish — tonkatsu, unagi, saba shioyaki',
    nj: 'Search a dish — butter chicken, burrata, ribs'
  };

  function collapseAllIn(grid){
    grid.querySelectorAll('.dish.expanded').forEach(tile => {
      const name = tile.dataset.name;
      const en = tile.dataset.en;
      tile.classList.remove('expanded');
      tile.innerHTML = `
        <div class="dish-name">${name}</div>
        <div class="dish-en">${en}</div>
        <div class="dish-arr"><svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></div>
      `;
    });
  }

  function expandRoot(tile){
    collapseAllIn(tile.parentElement);
    const name = tile.dataset.name;
    const en = tile.dataset.en;
    const prompt = tile.dataset.prompt || 'Which?';
    const tri = tile.dataset.tri === 'true';
    const branches = JSON.parse(tile.dataset.branches);
    const rootId = tile.dataset.root;
    tile.classList.add('expanded');
    const branchesHtml = branches.map(b => `
      <a class="branch" href="sakeyo_Pairing_Result.html?dish=${rootId}&amp;branch=${b.id}">
        <div class="branch-name">${b.name}</div>
        <div class="branch-en">${b.en}</div>
      </a>
    `).join('');
    tile.innerHTML = `
      <button type="button" class="dish-close" aria-label="Close">
        <svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
      <div class="dish-name">${name}</div>
      <div class="dish-en">${en}</div>
      <div class="branch-prompt">${prompt}</div>
      <div class="branches${tri ? ' tri' : ''}">${branchesHtml}</div>
    `;
    tile.querySelector('.dish-close').addEventListener('click', (e) => {
      e.stopPropagation();
      collapseAllIn(tile.parentElement);
    });
  }

  function goDirect(tile){
    const rootId = tile.dataset.root;
    window.location.href = `sakeyo_Pairing_Result.html?dish=${rootId}`;
  }

  function handleTileClick(e){
    const tile = e.target.closest('.dish');
    if (!tile) return;
    if (tile.classList.contains('expanded')) return;
    const kind = tile.dataset.kind;
    if (kind === 'direct'){
      goDirect(tile);
    } else if (kind === 'root'){
      expandRoot(tile);
    }
  }

  jpGrid.addEventListener('click', handleTileClick);
  njGrid.addEventListener('click', handleTileClick);

  toggleBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      const view = btn.dataset.view;
      toggleBtns.forEach(b => b.classList.toggle('on', b === btn));
      collapseAllIn(jpGrid);
      collapseAllIn(njGrid);
      if (view === 'jp'){
        jpGrid.style.display = '';
        njGrid.style.display = 'none';
        searchInput.placeholder = placeholders.jp;
      } else {
        jpGrid.style.display = 'none';
        njGrid.style.display = '';
        searchInput.placeholder = placeholders.nj;
      }
    });
  });
})();
</script>
